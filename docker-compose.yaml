# Game Clock on its OWN Tailscale node.
# nginx shares the Tailscale container's network namespace, so the clock
# appears on your tailnet as a separate machine ("gameclock") that runs
# nothing but this website. Share THAT node with guests -> they can reach
# only the clock and nothing else on your tailnet.
#
# The auth key is read from a local .env file (see .env.example). Never
# commit .env or a real tskey-* value.
#
# Adjust the host paths below to wherever you keep the app's data. The three
# directories (ts / config / web) must persist across restarts:
#   - ts     -> Tailscale state (node identity). Keep it; deleting it re-auths.
#   - config -> holds serve.json (Tailscale Serve config).
#   - web    -> nginx web root: put index.html + sounds/ here, nothing else.

services:
  ts-gameclock:
    image: tailscale/tailscale:latest
    container_name: ts-gameclock
    hostname: gameclock                       # becomes the MagicDNS name
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?set TS_AUTHKEY in your .env file}
      - TS_EXTRA_ARGS=--advertise-tags=tag:gameclock
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json     # serves HTTPS -> nginx:80
      - TS_USERSPACE=true                      # no /dev/net/tun needed on TrueNAS
    volumes:
      - /path/to/gameclock/ts:/var/lib/tailscale
      - /path/to/gameclock/config:/config
    restart: unless-stopped

  gameclock:
    image: nginx:alpine
    network_mode: service:ts-gameclock         # share the TS node's network
    volumes:
      - /path/to/gameclock/web:/usr/share/nginx/html:ro
    depends_on:
      - ts-gameclock
    restart: unless-stopped
